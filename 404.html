<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inhalt verschoben | Olalei Event-Archiv</title>
    <style>
        :root { --primary: #e67e22; --secondary: #2c3e50; --text: #333; --light: #f9f9f9; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0; 
            background: var(--light); 
            color: var(--text);
        }
        .container { 
            background: white; 
            padding: 50px; 
            border-radius: 12px; 
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border-top: 5px solid var(--primary);
            max-width: 500px;
        }
        .logo { font-size: 28px; font-weight: bold; margin-bottom: 20px; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--primary); }
        h1 { color: var(--secondary); font-size: 24px; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 25px; }
        .btn { 
            display: inline-block; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 12px 25px; 
            border-radius: 6px; 
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">OLA<span>LEI</span></div>
        <h1>Inhalt verschoben</h1>
        <p>Die gesuchte Unterseite des Archivs ist umgezogen oder nicht mehr verfügbar.</p>
        <p>Aktuelle Projektberichte und Informationen finden Sie auf unserer Startseite.</p>
        <a href="https://olalei.ch" class="btn">Zurück zur Übersicht</a>
    </div>
</body>
</html>
